name: Bullvora Alert Price Check

on:
  # Runs every 15 minutes during NSE market hours (Mon–Fri 9:15 AM–3:30 PM IST = 3:45–10:00 UTC)
  schedule:
    - cron: "*/15 3-10 * * 1-5"
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger alert price check
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "https://bullvora-app.vercel.app/api/push/check" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response code: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Check failed with status $RESPONSE"
            exit 1
          fi
          echo "Alert check completed successfully"
